<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Geometry Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; margin: 0 auto; }
    .level-picker {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9998;
      width: 420px;
      padding: 20px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: linear-gradient(180deg, rgba(12, 25, 45, 0.95), rgba(4, 10, 22, 0.95));
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      text-align: center;
      user-select: none;
    }
    .level-picker .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8fe0ff;
      margin-bottom: 16px;
    }
    .level-picker .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .level-picker .arrow {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .level-picker .arrow:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    .level-picker .arrow:active {
      transform: scale(0.92);
    }
    .level-picker .level-card {
      flex: 1;
      padding: 14px 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-width: 0;
    }
    .level-picker .level-number {
      font-size: 11px;
      font-weight: 600;
      color: #7ab8d4;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .level-picker .level-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .level-picker .level-difficulty {
      font-size: 28px;
      margin-top: 6px;
      line-height: 1;
    }
    .level-picker .level-song {
      font-size: 11px;
      color: #6a9bb5;
      margin-top: 4px;
    }
    .level-picker .play-btn {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #3ad, #1a7a9a);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: filter 0.15s, transform 0.1s;
    }
    .level-picker .play-btn:hover {
      filter: brightness(1.15);
    }
    .level-picker .play-btn:active {
      transform: scale(0.97);
    }
    @media (max-width: 500px) {
      .level-picker {
        width: calc(100% - 24px);
        padding: 14px;
      }
      .level-picker .level-name {
        font-size: 15px;
      }
      .level-picker .arrow {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    }
  </style>
  <script defer src="./vendor.js"></script>
  <script defer src="./game.js"></script>
  <script>
    function showBootError(message) {
      var panel = document.createElement('pre');
      panel.textContent = message;
      panel.style.position = 'fixed';
      panel.style.left = '12px';
      panel.style.right = '12px';
      panel.style.top = '12px';
      panel.style.zIndex = '99999';
      panel.style.padding = '10px 12px';
      panel.style.background = 'rgba(0,0,0,0.85)';
      panel.style.color = '#ff7878';
      panel.style.border = '1px solid #ff4d4f';
      panel.style.borderRadius = '8px';
      panel.style.font = '12px/1.4 Consolas, monospace';
      panel.style.whiteSpace = 'pre-wrap';
      document.body.appendChild(panel);
    }

    window.addEventListener('error', function (event) {
      showBootError('Runtime error: ' + (event.message || 'unknown'));
    });

    window.addEventListener('unhandledrejection', function (event) {
      var reason = event && event.reason ? String(event.reason) : 'unknown';
      showBootError('Unhandled rejection: ' + reason);
    });

    var DIFFICULTIES = {
      easy: { emoji: '\u{1F642}', label: 'Easy', color: '#4caf50' },
      normal: { emoji: '\u{1F610}', label: 'Normal', color: '#8bc34a' },
      hard: { emoji: '\u{1F928}', label: 'Hard', color: '#ff9800' },
      harder: { emoji: '\u{1F620}', label: 'Harder', color: '#f44336' },
      insane: { emoji: '\u{1F608}', label: 'Insane', color: '#9c27b0' },
      demon: { emoji: '\u{1F480}', label: 'Demon', color: '#3f51b5' }
    };

    var LEVELS = [
      { id: 1, name: 'Stereo Madness', song: 'StereoMadness.mp3', diff: 'easy' },
      { id: 2, name: 'Back on Track', song: 'BackOnTrack.mp3', diff: 'easy' },
      { id: 3, name: 'Polargeist', song: 'Polargeist.mp3', diff: 'normal' },
      { id: 4, name: 'Dry Out', song: 'DryOut.mp3', diff: 'normal' },
      { id: 5, name: 'Base After Base', song: 'BaseAfterBase.mp3', diff: 'normal' },
      { id: 6, name: "Can't Let Go", song: 'CantLetGo.mp3', diff: 'hard' },
      { id: 7, name: 'Jumper', song: 'Jumper.mp3', diff: 'hard' },
      { id: 8, name: 'Time Machine', song: 'TimeMachine.mp3', diff: 'hard' },
      { id: 9, name: 'Cycles', song: 'Cycles.mp3', diff: 'harder' },
      { id: 10, name: 'xStep', song: 'xStep.mp3', diff: 'harder' },
      { id: 11, name: 'Clutterfunk', song: 'Clutterfunk.mp3', diff: 'harder' },
      { id: 12, name: 'Theory of Everything', song: 'TheoryOfEverything.mp3', diff: 'insane' },
      { id: 13, name: 'Electroman Adventures', song: 'Electroman.mp3', diff: 'insane' },
      { id: 14, name: 'Clubstep', song: 'Clubstep.mp3', diff: 'demon' },
      { id: 15, name: 'Electrodynamix', song: 'Electrodynamix.mp3', diff: 'insane' },
      { id: 16, name: 'Hexagon Force', song: 'HexagonForce.mp3', diff: 'insane' },
      { id: 17, name: 'Blast Processing', song: 'BlastProcessing.mp3', diff: 'hard' },
      { id: 18, name: 'Theory of Everything 2', song: 'TheoryOfEverything2.mp3', diff: 'insane' },
      { id: 19, name: 'Geometrical Dominator', song: 'GeometricalDominator.mp3', diff: 'harder' },
      { id: 20, name: 'Deadlocked', song: 'Deadlocked.mp3', diff: 'demon' },
      { id: 21, name: 'Fingerdash', song: 'Fingerdash.mp3', diff: 'harder' },
      { id: 22, name: 'Dash', song: 'Dash.mp3', diff: 'normal' }
    ];

    function selectedLevelMeta() {
      var params = new URLSearchParams(window.location.search);
      var level = parseInt(params.get('level') || '1', 10);
      if (!Number.isFinite(level)) level = 1;
      return LEVELS.find(function (entry) { return entry.id === level; }) || LEVELS[0];
    }

    function updateTitleFromQuery() {
      var meta = selectedLevelMeta();
      document.title = 'Geometry Dash - ' + meta.name;
    }

    function mountLevelSelector() {
      var currentIndex = 0;
      LEVELS.forEach(function (e, i) { if (e.id === selectedLevelMeta().id) currentIndex = i; });

      var wrap = document.createElement('section');
      wrap.className = 'level-picker';
      wrap.innerHTML =
        '<div class="title">Select Level</div>' +
        '<div class="nav-row">' +
          '<button class="arrow" id="gdArrowLeft">\u25C0</button>' +
          '<div class="level-card">' +
            '<div class="level-number" id="gdLevelNum"></div>' +
            '<div class="level-name" id="gdLevelName"></div>' +
            '<div class="level-difficulty" id="gdLevelDiff"></div>' +
            '<div class="level-song" id="gdLevelSong"></div>' +
          '</div>' +
          '<button class="arrow" id="gdArrowRight">\u25B6</button>' +
        '</div>' +
        '<button class="play-btn" id="gdPlayBtn">Play</button>';
      document.body.appendChild(wrap);

      function renderLevel(index) {
        var level = LEVELS[index];
        var diff = DIFFICULTIES[level.diff];
        document.getElementById('gdLevelNum').textContent = 'Level ' + level.id;
        document.getElementById('gdLevelName').textContent = level.name;
        document.getElementById('gdLevelDiff').textContent = diff.emoji;
        document.getElementById('gdLevelSong').textContent = level.song.replace('.mp3', '');
      }

      function loadLevel(index) {
        var params = new URLSearchParams(window.location.search);
        params.set('level', LEVELS[index].id);
        window.location.search = params.toString();
      }

      renderLevel(currentIndex);

      document.getElementById('gdArrowLeft').addEventListener('click', function () {
        currentIndex = (currentIndex - 1 + LEVELS.length) % LEVELS.length;
        renderLevel(currentIndex);
      });

      document.getElementById('gdArrowRight').addEventListener('click', function () {
        currentIndex = (currentIndex + 1) % LEVELS.length;
        renderLevel(currentIndex);
      });

      document.getElementById('gdPlayBtn').addEventListener('click', function () {
        loadLevel(currentIndex);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft') {
          currentIndex = (currentIndex - 1 + LEVELS.length) % LEVELS.length;
          renderLevel(currentIndex);
          e.preventDefault();
        } else if (e.key === 'ArrowRight') {
          currentIndex = (currentIndex + 1) % LEVELS.length;
          renderLevel(currentIndex);
          e.preventDefault();
        } else if (e.key === 'Enter') {
          loadLevel(currentIndex);
        }
      });
    }

    updateTitleFromQuery();

    window.addEventListener('load', function () {
      mountLevelSelector();
      setTimeout(function () {
        var hasCanvas = !!document.querySelector('canvas');
        if (!hasCanvas) {
          var hasPhaser = typeof window.Phaser !== 'undefined';
          showBootError('Boot watchdog: no canvas created. Phaser loaded: ' + hasPhaser + '. Open DevTools Network and confirm reconstructed_vendor_bundle.js and reconstructed_game_logic.js return 200.');
        }
      }, 1200);
    });

    // Keep resize behavior aligned with the original runner.
    new ResizeObserver(() => {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</head>
<body>
</body>
</html>
